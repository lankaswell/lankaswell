<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marshmallow Live | LankaSwell</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --ocean:#0aa3a3;
      --sand:#fff4e6;
      --text:#132428;
      --muted:#5f6e6e;
      --card:#ffffff;
    }

    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(180deg,#ffffff 0%,var(--sand) 100%);
      color:var(--text);
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 30px;
      background:rgba(255,255,255,0.95);
      border-bottom:1px solid rgba(0,0,0,0.06);
      position:sticky;
      top:0;
      z-index:10;
    }

    .brand{
      font-weight:800;
      font-size:1.2em;
    }

    .brand .lanka{color:#000;}
    .brand .swell{color:var(--ocean);}

    a{
      text-decoration:none;
      color:var(--ocean);
      font-weight:600;
    }

    header{
      text-align:center;
      padding:30px 20px 10px 20px;
    }

    .title{
      font-size:2em;
      font-weight:800;
      margin-bottom:5px;
    }

    .subtitle{
      color:var(--muted);
      font-size:0.95em;
    }

    .container{
      display:flex;
      justify-content:center;
      padding:30px 15px;
    }

    .player{
      width:100%;
      max-width:1000px;
      aspect-ratio:16/9;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 8px 25px rgba(0,0,0,0.15);
      background:#000;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .info{
      text-align:center;
      margin-top:20px;
      color:var(--muted);
    }

    .back{
      text-align:center;
      margin-top:30px;
    }

    .back a{
      display:inline-block;
      padding:10px 16px;
      border-radius:10px;
      background:var(--ocean);
      color:white;
    }

    footer{
      text-align:center;
      padding:40px;
      opacity:0.5;
      font-size:0.9em;
    }

		.map-container {
  max-width: 900px;
  margin: 30px auto;
  aspect-ratio: 1 / 1; /* 👈 THIS is the magic */
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.map-container iframe {
  width: 100%;
  height: 100%;
  border: 0;
}
  </style>
</head>

<body>

<nav>
  <div class="brand">
    🌊 <span class="lanka">LANKA</span><span class="swell">SWELL</span>
  </div>
  <a href="index.html">← Home</a>
</nav>

<header>
  <div class="title">Ahangama Marshmellow</div>
  <div class="subtitle">View from </span><span class="swell">FOLLOW THE WHITE RABBIT</span> Restaurant</div>
</header>

<div class="container">
  <div class="player">
    <iframe
      src="https://player.twitch.tv/?channel=testament_zigos&parent=lankaswell.github.io&muted=true"
      allowfullscreen>
    </iframe>
  </div>
</div>

<div class="map-container">
  <iframe
    src="https://www.google.com/maps?q=Follow+The+White+Rabbit+Ahangama&output=embed"
    loading="lazy"
    allowfullscreen>
  </iframe>
</div>

<div style="text-align:center;margin-top:15px;">
  <a href="https://www.google.com/maps/dir/?api=1&destination=Follow+The+White+Rabbit+Ahangama"
     target="_blank"
     style="background:#0aa3a3;color:white;padding:10px 16px;border-radius:10px;text-decoration:none;font-weight:600;">
    Get Directions
  </a>
</div>

<footer>© 2026 LANKASWELL</footer>

</body>
</html>
