<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LankaSwell | South Coast Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --blue:#008CFF;
  --bg:#eaf6ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,sans-serif;
  overflow:hidden;
  background:var(--bg);
}

/* MAP */
#map{
  position:absolute;
  inset:0;
  z-index:1;
}

.leaflet-container{
  background:var(--bg)!important;
}

.leaflet-control-attribution{
  display:none!important;
}

/* MARKERS */
@keyframes pulse{
  0%{transform:scale(.6);opacity:.8;}
  100%{transform:scale(2.8);opacity:0;}
}

.marker{
  position:relative;
  width:20px;
  height:20px;
}

.marker .dot{
  position:absolute;
  inset:0;
  background:var(--blue);
  border:3px solid white;
  border-radius:50%;
  box-shadow:0 0 14px rgba(0,140,255,.5);
}

.marker .ring{
  position:absolute;
  inset:-10px;
  border:2px solid var(--blue);
  border-radius:50%;
  animation:pulse 2.4s infinite;
}

/* TOP LABEL */
.top-label{
  position:absolute;
  top:1rem;
  left:1rem;
  z-index:1000;

  background:rgba(255,255,255,.8);
  backdrop-filter:blur(10px);

  padding:.5rem .8rem;
  border-radius:12px;

  font-size:.8rem;
  font-weight:600;
}

/* MOBILE NAV (BOTTOM PILLS) */
.nav{
  position:absolute;
  bottom:1rem;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;

  display:flex;
  gap:.5rem;
}

.nav button{
  border:none;
  cursor:pointer;

  padding:.6rem 1rem;
  border-radius:999px;

  font-size:.8rem;
  font-weight:600;

  background:rgba(255,255,255,.9);
  box-shadow:0 6px 18px rgba(0,0,0,.12);

  transition:.2s;
}

.nav button.active{
  background:var(--blue);
  color:white;
}

/* DESKTOP: same nav but vertical */
@media(min-width:768px){

  .nav{
    top:50%;
    bottom:auto;
    left:auto;
    right:1rem;
    transform:translateY(-50%);
    flex-direction:column;
  }

}

/* POPUP */
.popup-name{
  font-weight:700;
}

.popup-coords{
  font-size:.7rem;
  opacity:.6;
  margin-top:2px;
}

</style>
</head>

<body>

<div class="top-label">LankaSwell · South Coast Live Map</div>

<div id="map"></div>

<div class="nav">
  <button onclick="flyTo(5.9733,80.3575,this,'Marshmallow')">Marshmallow</button>
	<button onclick="flyTo(5.9436,80.4549,this,'Mirissa Point')">Mirissa</button>
	<button onclick="flyTo(5.9384,80.4680,this,'Temple Point')">Temple</button>
	<button onclick="flyTo(5.9707,80.4373,this,'Weligama')">Weligama</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP (SOUTH COAST VIEW)
const map = L.map('map',{
  zoomControl:false,
  attributionControl:false
});

// Light coastal tiles
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { maxZoom:19 }
).addTo(map);

// FIT SOUTH COAST (all points visible)
const bounds = L.latLngBounds([
  [5.9733,80.3575],
  [5.9436,80.4549],
  [5.9384,80.4680],
  [5.9707,80.4373]
]);

map.fitBounds(bounds.pad(0.35));

function icon(){
  return L.divIcon({
    className:"",
    html:`
      <div class="marker">
        <div class="dot"></div>
        <div class="ring"></div>
      </div>
    `,
    iconSize:[20,20],
    iconAnchor:[10,10]
  });
}

// SPOTS
const spots = [
  {
    name:"Marshmallow",
    lat:5.9733,
    lng:80.3575,
    url:"spot-template.html?id=marshmallow"
  },
  {
    name:"Mirissa Point",
    lat:5.9436,
    lng:80.4549,
    url:"spot-template.html?id=mirissa-point"
  },
  {
    name:"Temple Point",
    lat:5.9384,
    lng:80.4680,
    url:"spot-template.html?id=temple-point"
  },
  {
	name:"Weligama",
	lat:5.9707, 
	lng:80.4373,
	url:"spot-template.html?id=weligama"
  }
];

spots.forEach(s=>{

  const popup = `
  <div class="popup-name">${s.name}</div>

  <div class="popup-coords">
    ${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}
  </div>

  <a href="${s.url}" target="_parent" class="popup-link" style="
    display:inline-block;
    margin-top:8px;
    font-weight:700;
    color:#008CFF;
    text-decoration:none;
  ">
    → Open Live Camera
  </a>
`;

  s.marker = L.marker([s.lat,s.lng],{icon:icon()})
  .addTo(map)
  .bindPopup(popup,{closeButton:false});

});

// NAV LOGIC
function flyTo(lat,lng,btn,spotName){

  document.querySelectorAll(".nav button")
    .forEach(b=>b.classList.remove("active"));

  if(btn) btn.classList.add("active");

  map.flyTo([lat,lng],14,{
    duration:1.8
  });

  // OPEN POPUP AFTER ANIMATION
  const spot = spots.find(s => s.name === spotName);
  if(spot && spot.marker){
    setTimeout(()=>{
      spot.marker.openPopup();
    }, 1800); // match flyTo duration
  }
}

</script>

</body>
</html>
