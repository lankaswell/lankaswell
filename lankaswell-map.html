<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LankaSwell | The Southern Frontier</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&f[]=instrument-sans@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>

:root{
  --bone:#ffffff;
  --obsidian:#1A1D1F;
  --reef:#0095ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
}

body{
  font-family:'Satoshi',sans-serif;
  overflow:hidden;
  background:#dceef8;
}

#map{
  position:absolute;
  inset:0;
  z-index:1;
}

.leaflet-container{
  background:#dceef8 !important;
}

.leaflet-control-attribution{
  display:none !important;
}

.leaflet-tile-pane{
  filter:saturate(1.05) contrast(1.03);
}

.leaflet-popup-content-wrapper{
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.popup-name{
  font-family:'Instrument Sans',sans-serif;
  font-weight:700;
  font-size:.9rem;
}

.popup-coords{
  font-family:'JetBrains Mono',monospace;
  font-size:.6rem;
  opacity:.6;
  margin-top:4px;
}

/* MARKERS */

@keyframes sonar{
  from{
    transform:scale(.6);
    opacity:.8;
  }
  to{
    transform:scale(3);
    opacity:0;
  }
}

.marker-dot{
  position:relative;
  width:22px;
  height:22px;
}

.marker-dot .core{
  position:absolute;
  inset:0;

  background:var(--reef);

  border:4px solid white;
  border-radius:50%;

  box-shadow:
    0 0 12px rgba(0,149,255,.6),
    0 0 28px rgba(0,149,255,.35);

  z-index:2;
}

.marker-dot .ring{
  position:absolute;

  top:-8px;
  left:-8px;

  width:38px;
  height:38px;

  border-radius:50%;
  border:2px solid var(--reef);

  animation:sonar 2.4s infinite;
}

/* OVERLAY */

.overlay{
  position:absolute;
  inset:0;
  z-index:1000;
  pointer-events:none;

  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* HEADER */

header{
  padding:2rem 3rem 0;
  pointer-events:auto;
}

.brand-logo{
  font-family:'Instrument Sans',sans-serif;
  font-size:1.5rem;
  font-weight:700;
  color:#111;
}

.brand-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:.65rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  opacity:.45;
}

.header-rule{
  height:1px;
  margin:1rem 3rem 0;
  background:rgba(0,0,0,.08);
}

/* NAVIGATION */

.location-nav{
  position:absolute;

  right:3rem;
  top:50%;

  transform:translateY(-50%);

  text-align:right;
  pointer-events:auto;
}

.nav-item{
  display:block;

  background:none;
  border:none;

  cursor:pointer;

  font-family:'Instrument Sans',sans-serif;
  font-weight:700;

  font-size:clamp(1.5rem,3vw,2.8rem);

  color:#111;

  opacity:.35;

  margin-bottom:.6rem;

  transition:.25s;
}

.nav-item:hover{
  opacity:1;
  transform:translateX(-10px);
}

.nav-item.active{
  opacity:1;
  color:var(--reef);
}

.nav-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:.65rem;

  text-transform:uppercase;
  letter-spacing:.12em;

  opacity:.45;
  margin-top:1rem;
}

/* FOOTER */

footer{
  padding:0 3rem 1.5rem;
  pointer-events:auto;
}

.footer-rule{
  height:1px;
  background:rgba(0,0,0,.08);
  margin-bottom:.75rem;
}

.footer-inner{
  display:flex;
  justify-content:space-between;
}

.footer-text{
  font-family:'JetBrains Mono',monospace;
  font-size:.55rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  opacity:.45;
}

/* MOBILE */

@media (max-width:768px){

  header{
    padding:1rem 1rem 0;
  }

  .header-rule{
    margin:.75rem 1rem 0;
  }

  .location-nav{

    left:50%;
    right:auto;

    bottom:4.5rem;
    top:auto;

    transform:translateX(-50%);

    width:calc(100% - 2rem);
    max-width:320px;

    text-align:center;

    background:rgba(20,25,30,.72);

    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border-radius:20px;

    padding:1rem;
  }

  .nav-item{
    color:white;
    font-size:1rem;
    margin-bottom:.45rem;
    opacity:.85;
  }

  .nav-item.active{
    color:#4db4ff;
  }

  .nav-meta{
    display:none;
  }

  footer{
    padding:0 1rem 1rem;
  }

  .footer-text{
    font-size:.5rem;
  }
}

</style>
</head>
<body>

<div id="map"></div>

<div class="overlay">

  <div>
    <header>
      <div>
        <div class="brand-logo">LankaSwell</div>
        <div class="brand-sub">The Southern Frontier</div>
      </div>
    </header>

    <div class="header-rule"></div>
  </div>

  <nav class="location-nav">

    <button class="nav-item active"
      onclick="flyTo(5.973371876984806,80.35753405630781,this)">
      Marshmallow
    </button>

    <button class="nav-item"
      onclick="flyTo(5.94367887022686,80.45492100038744,this)">
      Mirissa Point
    </button>

    <button class="nav-item"
      onclick="flyTo(5.938463202710493,80.46808120169506,this)">
      Temple Point
    </button>

    <div class="nav-meta">
      3 Locations · South Coast
    </div>

  </nav>

  <footer>
    <div class="footer-rule"></div>

    <div class="footer-inner">
      <span class="footer-text">© LankaSwell</span>
      <span class="footer-text">Live Surf Cameras</span>
    </div>
  </footer>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map',{
  center:[5.955,80.41],
  zoom:13,
  zoomControl:false,
  attributionControl:false
});

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    maxZoom:20
  }
).addTo(map);

function pulseIcon(){
  return L.divIcon({
    className:'',
    html:`
      <div class="marker-dot">
        <div class="core"></div>
        <div class="ring"></div>
      </div>
    `,
    iconSize:[22,22],
    iconAnchor:[11,11]
  });
}

const locations = [
{
  name:'Marshmallow',
  lat:5.973371876984806,
  lng:80.35753405630781
},
{
  name:'Mirissa Point',
  lat:5.94367887022686,
  lng:80.45492100038744
},
{
  name:'Temple Point',
  lat:5.938463202710493,
  lng:80.46808120169506
}
];

locations.forEach(loc=>{

  const popup = `
    <div class="popup-name">${loc.name}</div>
    <div class="popup-coords">
      ${loc.lat.toFixed(4)}°N, ${loc.lng.toFixed(4)}°E
    </div>
  `;

  L.marker(
    [loc.lat, loc.lng],
    {icon:pulseIcon()}
  )
  .addTo(map)
  .bindPopup(popup,{closeButton:false});

});

function flyTo(lat,lng,button){

  document.querySelectorAll('.nav-item')
    .forEach(el=>el.classList.remove('active'));

  if(button){
    button.classList.add('active');
  }

  map.flyTo(
    [lat,lng],
    15,
    {
      duration:1.8
    }
  );
}

</script>

</body>
</html>
