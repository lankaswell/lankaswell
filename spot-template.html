<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta
  name="description"
  content="Live surf cameras from Sri Lanka. Check current wave conditions, surf spot information, and local surf services with LankaSwell."
>

<title>LankaSwell Surf Cam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root{
  --ocean:#0aa3a3;
  --text:#132428;
  --muted:#5f6e6e;
}

/* BASE */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f7f7f7;
  color:var(--text);
}

/* NAVBAR (same style as homepage) */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 22px;
  background:rgba(255,255,255,0.96);
  border-bottom:1px solid rgba(0,0,0,0.06);
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(8px);
}

.brand{
  font-weight:800;
  font-size:1.3rem;
  letter-spacing:1px;
  text-decoration:none;
  color:inherit;
  display:flex;
  align-items:center;
  gap:6px;
}

.brand .lanka{color:#000;}
.brand .swell{color:var(--ocean);}

.nav-links{
  display:flex;
  gap:18px;
}

.nav-links a{
  text-decoration:none;
  color:var(--muted);
  font-weight:600;
  font-size:0.95rem;
}

/* MOBILE MENU */
.hamburger{
  display:none;
  font-size:1.7rem;
  cursor:pointer;
}

@media(max-width:768px){
  .hamburger{display:block;}

  .nav-links{
    display:none;
    flex-direction:column;
    position:absolute;
    top:60px;
    right:18px;
    background:white;
    padding:14px;
    border-radius:14px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
  }

  .nav-links.active{
    display:flex;
  }
}

/* LAYOUT */
.container{
  max-width:900px;
  margin:0 auto;
  padding:16px;
}

/* TITLE */
.stream-title{
  text-align:center;
  margin:12px 0 12px;
  font-size:1.6rem;
  font-weight:800;
}

.live{
  color:#00b36b;
  font-size:0.75rem;
  font-weight:800;
  letter-spacing:1px;
  margin-bottom:6px;
}

/* STREAM */

.stream-box {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  background: black;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);

  aspect-ratio: 16 / 9;
}

.stream-box video {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
}

@media (max-width: 768px) {
  .stream-box {
    aspect-ratio: 16 / 10;   /* slightly shorter feel */
    max-height: 40vh;        /* prevents âtoo tallâ */
  }
}
/* INFO */
.info{
  background:white;
  margin-top:16px;
  padding:16px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.small{
  opacity:0.75;
  font-size:0.9rem;
  line-height:1.6;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
  font-size:0.95rem;
}

.btn-primary{
  background:var(--ocean);
  color:white;
}

.btn-secondary{
  background:#e9f7f7;
  color:var(--ocean);
}

/* OFFERS */
.offer{
  margin-top:16px;
  background:white;
  padding:16px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.offer h3{
  margin-top:0;
}

footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
  font-size:0.85rem;
}


/*SURFSPOT INFO*/
/* MINI SURF INFO */
.spot-mini{
  margin-top:16px;
  background:white;
  padding:14px 16px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.spot-mini-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:10px;
}

.mini-item{
  background:#f4f8f8;
  border-radius:10px;
  padding:10px;
  font-size:0.85rem;
  font-weight:600;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:8px;
}

.mini-text{
  margin:0;
  font-size:0.88rem;
  line-height:1.5;
  opacity:0.8;
}

/*SERVICES*/
.services{
  margin-top:16px;
  background:white;
  padding:16px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.services h3{
  margin-top:0;
  margin-bottom:16px;
}

.service-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.service-card{
  background:#f4f8f8;
  border-radius:14px;
  padding:16px;
}

.service-icon{
  font-size:1.8rem;
  margin-bottom:10px;
}

.service-card h4{
  margin:0 0 8px;
}

.service-card p{
  font-size:0.9rem;
  opacity:0.75;
  line-height:1.5;
}

.service-btn{
  display:inline-block;
  margin-top:12px;
  padding:10px 14px;
  background:var(--ocean);
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:700;
  font-size:0.9rem;
}

.featured-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
  margin-bottom:20px;
}

.featured-card{
  position:relative;
  background:linear-gradient(
    135deg,
    #f5ffff,
    #ffffff
  );

  border:2px solid rgba(10,163,163,0.25);

  border-radius:16px;

  padding:20px;

  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.featured-badge{
  position:absolute;
  top:12px;
  right:12px;

  background:var(--ocean);

  color:white;

  font-size:0.7rem;

  font-weight:700;

  padding:5px 10px;

  border-radius:999px;
}

.featured-card h4{
  margin-top:8px;
}

.offline {
  position: absolute;
  inset: 0;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.offline.hidden {
  display: none;
}

.offline h2 {
  margin-bottom: 10px;
  font-size: 1.6rem;
}

.offline p {
  opacity: 0.8;
  max-width: 400px;
  line-height: 1.5;
}

.status-overlay{
  position:absolute;
  inset:0;
  background:black;
  color:white;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;
  padding:20px;
  z-index:5;
}

.status-overlay.hidden{
  display:none;
}

.status-overlay h2{
  margin-bottom:12px;
  font-size:1.7rem;
}

.status-overlay p{
  opacity:0.8;
  line-height:1.6;
  max-width:400px;
}

/* SURF INFO MODAL */

.modal{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.65);

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:9999;

  opacity:0;
  visibility:hidden;

  transition:0.25s;
}

.modal.active{
  opacity:1;
  visibility:visible;
}

.modal-content{
  background:white;

  width:min(90%,700px);

  max-height:85vh;
  overflow-y:auto;

  border-radius:20px;

  padding:24px;

  position:relative;

  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.modal-close{
  position:absolute;
  top:14px;
  right:18px;

  font-size:1.8rem;
  cursor:pointer;

  color:#666;
}

.modal h2{
  margin-top:0;
}

.modal-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin:16px 0;
}

.modal-item{
  background:#f4f8f8;
  padding:12px;
  border-radius:12px;
  font-size:0.9rem;
}

.modal-section{
  margin-top:20px;
}

.modal-section h3{
  margin-bottom:8px;
}

/* HOST VENUE */

.host-venue{
  margin-top:16px;
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.host-image{
  width:100%;
  height:220px;
  object-fit:cover;
  object-position: center bottom;
}

.host-content{
  padding:18px;
}

.host-badge{
  display:inline-block;
  background:#e9f7f7;
  color:var(--ocean);
  font-weight:700;
  font-size:0.8rem;
  padding:6px 10px;
  border-radius:999px;
  margin-bottom:12px;
}

.host-content h3{
  margin:0 0 10px;
}

.host-features{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin:14px 0;
}

.host-feature{
  background:#f4f8f8;
  padding:10px;
  border-radius:10px;
  font-size:0.9rem;
}

.host-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

.host-btn{
  flex:1;
  text-align:center;
  text-decoration:none;
  padding:12px;
  border-radius:12px;
  font-weight:700;
}

.host-btn-primary{
  background:var(--ocean);
  color:white;
}

.host-btn-secondary{
  background:#e9f7f7;
  color:var(--ocean);
}

.host-social{
  display:flex;
  gap:14px;
  margin-top:12px;
  align-items:center;
}

.social-icon{
  width:38px;
  height:38px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:10px;

  background:#f4f8f8;

  transition:0.2s;
}

.social-icon:hover{
  transform:scale(1.05);
  background:#e9f7f7;
}

.social-icon img{
  width:18px;
  height:18px;
  opacity:0.8;
}

/* WATCHERS */
.watch-badge{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;

  display:inline-flex;
  align-items:center;
  gap:6px;

  background:rgba(230,0,35,0.9);
  color:white;

  padding:4px 10px;
  border-radius:999px;

  font-weight:600;
  font-size:0.75rem;

  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  backdrop-filter:blur(6px);
}

@media (max-width: 768px){
  .watch-badge{
    font-size:0.6rem;
    padding:2px 6px;
    top:8px;
  }
}

.live-dot{
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  display:inline-block;

  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.6); opacity:0.5; }
  100% { transform:scale(1); opacity:1; }
}


.host-discover-btn{
  display:block;

  margin-top:16px;

  text-align:center;

  text-decoration:none;

  background:linear-gradient(
    135deg,
    #0aa3a3,
    #0cc7c7
  );

  color:white;

  padding:14px;

  border-radius:12px;

  font-weight:700;

  transition:0.2s;
}

.host-discover-btn:hover{
  transform:translateY(-2px);
}

.partner-cta{
  margin-top:14px;
  background:#ffffff;
  border:2px solid rgba(10,163,163,0.25);
  border-left:6px solid var(--ocean);
  border-radius:14px;
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  box-sizing:border-box;
  overflow:hidden;
}

.partner-cta div{
  min-width:0;
}

.partner-cta strong{
  display:block;
  font-size:1rem;
}

.partner-cta p{
  margin:4px 0 0;
  font-size:0.9rem;
  line-height:1.45;
  color:var(--muted);
}

.partner-cta a{
  background:var(--ocean);
  color:white;
  text-decoration:none;
  font-weight:800;
  padding:11px 14px;
  border-radius:10px;
  font-size:0.9rem;
  text-align:center;
  max-width:220px;
  min-width:150px;
  white-space:normal;
  overflow-wrap:break-word;
  box-sizing:border-box;
}

@media(max-width:768px){
  .partner-cta{
    flex-direction:column;
    align-items:stretch;
  }

  .partner-cta a{
    width:100%;
    max-width:none;
    min-width:0;
  }
}

#surfModal,
#surfModal * {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

.surf-copyright{
    margin-top: 24px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.1);
    
    font-size: 0.8rem;
    opacity: 0.65;
    line-height: 1.4;
}

.surf-guide-btn{
    border:2px solid rgba(255,140,140,0.9);
    animation:surfGuideGlow 2.5s ease-in-out infinite;

    box-shadow:
        0 0 5px rgba(255,140,140,0.25);

    transition:all 0.2s ease;
}

.surf-guide-btn:hover{
    transform:translateY(-1px);
}

@keyframes surfGuideGlow{
    0%,100%{
        box-shadow:
            0 0 5px rgba(255,140,140,0.25);
    }

    50%{
        box-shadow:
            0 0 10px rgba(255,140,140,0.9),
            0 0 20px rgba(255,140,140,0.45),
            0 0 35px rgba(255,140,140,0.2);
    }
}

.venue-slider{
  position:relative;
  margin:12px 0;
}

.venue-viewport{
  overflow:hidden;
  border-radius:14px;
}

.venue-track{
  display:flex;
  transition:transform 0.35s ease;
  will-change:transform;
}

.venue-track img{
  width:100%;
  flex:0 0 100%;
  height:320px;
  object-fit:cover;
}

/* arrows */
.venue-prev,
.venue-next{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,0.45);
  color:white;
  font-size:1.2rem;
  cursor:pointer;
  z-index:2;
}

.venue-prev{ left:10px; }
.venue-next{ right:10px; }

/* dots */
.venue-dots{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:10px;
}

.venue-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:#ccc;
  cursor:pointer;
}

.venue-dot.active{
  background:var(--ocean);
}


/* =========================
   LANKASWELL ROADTRIP V2
   (glow / wave style)
========================= */

.roadtrip{
  margin-top:16px;
  padding:14px 10px;
  border-radius:18px;

  background:linear-gradient(
    135deg,
    #ffffff,
    #f4fbfb
  );

  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  overflow-x:auto;
}

.roadtrip-inner{
  display:flex;
  align-items:center;
  min-width:max-content;
  gap:12px;
}

.roadtrip-label{
  font-size:0.75rem;
  font-weight:800;
  opacity:0.6;
  letter-spacing:1px;
}

.roadtrip-line{
  display:flex;
  align-items:center;
  position:relative;
}

/* glowing baseline */
.roadtrip-line::before{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:50%;
  height:3px;

  background:linear-gradient(
    90deg,
    rgba(10,163,163,0.1),
    rgba(10,163,163,0.8),
    rgba(10,163,163,0.1)
  );

  transform:translateY(-50%);
  filter:blur(0.2px);
  animation:flow 3s linear infinite;
}

/* subtle wave motion */
@keyframes flow{
  0% { transform:translateY(-50%) translateX(-10%); }
  100% { transform:translateY(-50%) translateX(10%); }
}

.roadtrip-wrapper{
  display:flex;
  align-items:center;
  gap:6px;
  margin:0 10px;
  position:relative;
  z-index:2;
}

/* DOTS */
.roadtrip-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#cfd8dc;
  border:2px solid white;
  cursor:pointer;

  transition:0.25s;
  position:relative;
}

/* glow aura */
.roadtrip-dot::after{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;
  background:rgba(10,163,163,0.2);
  opacity:0;
  transition:0.25s;
}

/* hover */
.roadtrip-dot:hover::after{
  opacity:1;
}

/* ACTIVE SPOT (PULSING) */
.roadtrip-dot.active{
  background:var(--ocean);
  transform:scale(1.4);
  box-shadow:0 0 12px rgba(10,163,163,0.6);
}

.roadtrip-dot.active::after{
  opacity:1;
  animation:pulse 1.6s infinite;
}

@keyframes pulse{
  0% { transform:scale(1); opacity:0.6; }
  100% { transform:scale(2.2); opacity:0; }
}

/* names */
.roadtrip-name{
  font-size:0.75rem;
  font-weight:700;
  opacity:0.85;
  white-space:nowrap;
}

/* distance segments */
.roadtrip-seg{
  font-size:0.7rem;
  opacity:0.45;
  white-space:nowrap;
}

.roadtrip-shell{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 8px;
  overflow-x:auto;
}

.roadtrip-west,
.roadtrip-east{
  font-weight:800;
  font-size:12px;
  opacity:0.6;
  flex:0 0 auto;
}

/* MAIN TRACK */
.roadtrip-track{
  display:flex;
  align-items:center;
  gap:10px;
}

/* NODE */
.roadtrip-node{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-width:70px;
}

/* DOT */
.roadtrip-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#008CFF;
  border:2px solid white;
  box-shadow:0 0 10px rgba(0,140,255,0.4);
  cursor:pointer;
  transition:0.2s;
  position:relative;
}

/* ACTIVE DOT (ONLY ONE REALLY GLOWS) */
.roadtrip-dot.active{
  background:#00ffb3;
  box-shadow:0 0 14px rgba(0,255,179,0.9);
  transform:scale(1.25);
}

/* LABEL */
.roadtrip-name{
  font-size:10px;
  margin-top:6px;
  opacity:0.65;
  text-align:center;
  white-space:nowrap;
}

.roadtrip-name.active{
  opacity:1;
  font-weight:700;
}

/* SEGMENT */
.roadtrip-segment{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:60px;
  position:relative;
}

/* LINE BETWEEN DOTS */
.roadtrip-line{
  height:2px;
  width:100%;
  background:rgba(0,140,255,0.25);
  margin-bottom:4px;
}

/* DISTANCE LABEL */
.roadtrip-distance{
  font-size:9px;
  opacity:0.6;
  white-space:nowrap;
}

.roadtrip-title{
  font-size:12px;
  font-weight:800;
  letter-spacing:1px;
  text-transform:uppercase;
  text-align:center;
  margin-bottom:10px;
  opacity:0.7;
}
</style>
