<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌊 LankaSwell</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #eaf6fb 0%, #ffffff 100%);
      color: #0b1e2d;
    }

    header {
      text-align: center;
      padding: 80px 20px 60px;
    }

    .logo {
      width: 160px;
      height: 160px;
      object-fit: cover;
      background: white;
      padding: 12px;
      border-radius: 50%;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* Responsive: bigger logo on larger screens */
    @media (min-width: 768px) {
      .logo {
        width: 220px;
        height: 220px;
      }
    }

    @media (min-width: 1200px) {
      .logo {
        width: 280px;
        height: 280px;
      }
    }

    h1 {
      font-size: 3em;
      margin: 10px 0;
      font-weight: 800;
    }

    .subtitle {
      font-size: 1.3em;
      opacity: 0.7;
    }

    .cta {
      margin-top: 40px;
    }

    input {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      width: 260px;
      font-size: 1em;
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      background: #00c2ff;
      color: white;
      cursor: pointer;
      margin-left: 10px;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .spots {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      padding: 25px;
      width: 260px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .tag {
      font-size: 0.85em;
      opacity: 0.6;
    }

    .highlight {
      font-size: 1.5em;
      font-weight: 600;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.5;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="LankaSwell Logo" class="logo">

  
  <div class="subtitle">Watch the waves before you paddle out</div>

  <div class="cta">
    <input type="email" placeholder="Enter your email">
    <button>Get Early Access</button>
  </div>
</header>

<section>
  <div class="highlight">Live cams coming soon</div>

  <div class="spots">
    <div class="card">
      <h3>Arugam Bay</h3>
      <p class="tag">Point break • Advanced</p>
    </div>

    <div class="card">
      <h3>Weligama</h3>
      <p class="tag">Beginner friendly • Daily waves</p>
    </div>

    <div class="card">
      <h3>Hiriketiya</h3>
      <p class="tag">Hidden bay • Clean lines</p>
    </div>
  </div>
</section>

<section>
  <div class="highlight">No more guessing</div>
  <p>Check conditions in real time. Plan your surf. Save your sessions.</p>
</section>

<footer>
  <p>© 2026 LankaSwell</p>
</footer>

</body>
</html>
