<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌊 LankaSwell</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ocean: #00a8a8;
      --wave: #00d4ff;
      --sand: #fff4e6;
      --sun: #ff7b00;
      --text: #1f2d3d;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #dff6ff 0%, var(--sand) 100%);
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 80px 20px 60px;
    }

    .logo {
      width: 160px;
      height: 160px;
      object-fit: cover;
      background: white;
      padding: 12px;
      border-radius: 50%;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    @media (min-width: 768px) {
      .logo { width: 220px; height: 220px; }
    }

    @media (min-width: 1200px) {
      .logo { width: 280px; height: 280px; }
    }

    .subtitle {
      font-size: 1.3em;
      opacity: 0.9;
      color: #444;
    }

    .cta {
      margin-top: 40px;
    }

    input {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      width: 260px;
      font-size: 1em;
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--sun), #ffb347);
      color: white;
      cursor: pointer;
      margin-left: 10px;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.07) rotate(-1deg);
      box-shadow: 0 8px 20px rgba(255,123,0,0.4);
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .spots {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      padding: 25px;
      width: 260px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      transition: 0.3s;
      border: 2px solid rgba(0,0,0,0.03);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-8px) rotate(0.5deg);
      box-shadow: 0 15px 30px rgba(0,0,0,0.12);
    }

    .highlight {
      font-size: 1.6em;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--ocean);
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.6;
      font-size: 0.9em;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      width: 90%;
      max-width: 900px;
      background: black;
      border-radius: 12px;
      overflow: hidden;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="LankaSwell Logo" class="logo">
  <div class="subtitle">Watch the waves before you paddle out</div>

  <div class="cta">
    <input type="email" placeholder="Enter your email">
    <button>Get Early Access</button>
  </div>
</header>

<section>
  <div class="highlight">Live cams coming soon</div>

  <div class="spots">
    <div class="card" onclick="openStream()">
      <div style="position:absolute; margin-top:-10px; margin-left:180px; background:linear-gradient(135deg,#ff7b00,#ffb347); color:white; font-size:0.75em; padding:4px 10px; border-radius:999px; font-weight:700;">
        🔴 LIVE
      </div>
      <h3>Arugam Bay</h3>
      <p class="tag">Click to watch live surf</p>
    </div>

    <div class="card">
      <h3>Weligama</h3>
      <p class="tag">Beginner friendly • Daily waves</p>
    </div>

    <div class="card">
      <h3>Hiriketiya</h3>
      <p class="tag">Hidden bay • Clean lines</p>
    </div>
  </div>
</section>

<div id="modal" class="modal" onclick="closeStream()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close" onclick="closeStream()">&times;</span>
    <!-- Replace CHANNEL_NAME with your Twitch channel -->
    <iframe
      src="https://player.twitch.tv/?channel=testament_zigos&parent=lankaswell.github.io&muted=true"
      allowfullscreen>
    </iframe>
  </div>
</div>

<footer>
  <p>© 2026 LankaSwell</p>
</footer>

<script>
function openStream() {
  document.getElementById('modal').style.display = 'flex';
}

function closeStream() {
  document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
