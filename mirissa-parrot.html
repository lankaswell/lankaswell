<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirissa Surf Cam – LankaSwell</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --ocean:#0aa3a3;
      --sand:#fff4e6;
      --text:#132428;
      --muted:#5f6e6e;
    }

    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(180deg,#ffffff 0%,var(--sand) 100%);
      color:var(--text);
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 30px;
      background:white;
      border-bottom:1px solid rgba(0,0,0,0.05);
    }

    .brand{
      font-weight:800;
      font-size:1.4em;
    }

    .brand .lanka{color:#000;}
    .brand .swell{color:var(--ocean);}
    
    header{
      text-align:center;
      padding:30px 20px 10px;
    }

    .title{
      font-size:1.8em;
      font-weight:800;
    }

    .live-badge{
      display:inline-block;
      margin-top:10px;
      background:#ff6b4a;
      color:white;
      padding:5px 12px;
      border-radius:999px;
      font-size:0.75em;
      font-weight:700;
    }

    .container{
      max-width:1000px;
      margin:0 auto;
      padding:20px;
    }

    .video-container{
      width:100%;
      aspect-ratio:16/9;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
    }

    .video-container iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .map-container{
      margin-top:30px;
      aspect-ratio:4/3;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .map-container iframe{
      width:100%;
      height:100%;
      border:0;
    }

    .info{
      margin-top:25px;
      text-align:center;
    }

    .button{
      display:inline-block;
      margin-top:10px;
      background:#0aa3a3;
      color:white;
      padding:10px 18px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
    }

    footer{
      text-align:center;
      padding:30px;
      opacity:0.6;
      font-size:0.9em;
    }
  </style>
</head>

<body>

<nav>
  <div class="brand">
    🌊 <span class="lanka">LANKA</span><span class="swell">SWELL</span>
  </div>
</nav>

<header>
  <div class="title">MIRISSA SURF CAM</div>
  <div class="live-badge">LIVE</div>
</header>

<div class="container">

  <!-- VIDEO -->
  <div class="video-container">
    <iframe 
      src="https://player.twitch.tv/?channel=testament_zigos&parent=lankaswell.github.io&muted=true"
      allowfullscreen>
    </iframe>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <iframe 
      src="https://www.google.com/maps?q=5.9487,80.4592&output=embed"
      loading="lazy">
    </iframe>
  </div>

  <!-- INFO -->
  <div class="info">
    <p>
      Check real-time conditions before heading out. Clean waves, tropical water,
      and one of the most consistent breaks on the south coast.
    </p>

    <a href="https://www.google.com/maps/dir/?api=1&destination=5.9487,80.4592" 
       target="_blank" class="button">
       Get Directions
    </a>
  </div>

</div>

<footer>© 2026 LANKASWELL</footer>

</body>
</html>
