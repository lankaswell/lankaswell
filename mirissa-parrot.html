<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirissa – LankaSwell</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --ocean:#0aa3a3;
  --sand:#fff4e6;
  --text:#132428;
  --muted:#5f6e6e;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#ffffff 0%,var(--sand) 100%);
  color:var(--text);
}

/* NAV */

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:rgba(255,255,255,0.95);
  border-bottom:1px solid rgba(0,0,0,0.06);
}

.brand{
  font-weight:800;
  font-size:1.4em;
  transform: scaleY(1.25);
}

.brand .lanka{color:#000;}
.brand .swell{color:var(--ocean);}

.back{
  text-decoration:none;
  color:var(--muted);
  font-weight:600;
}

/* CONTAINER */

.container{
  max-width:1000px;
  margin:0 auto;
  padding:25px 20px;
}

.title{
  text-align:center;
  font-size:2em;
  font-weight:800;
  margin-bottom:20px;
}

/* VIDEO */

.video-container{
  width:100%;
  aspect-ratio:16/9;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.video-container iframe{
  width:100%;
  height:100%;
  border:none;
}

/* HOST (restaurant branding) */

.host{
  margin-top:20px;
  display:flex;
  align-items:center;
  gap:15px;
  background:white;
  padding:15px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.host-img{
  width:80px;
  height:80px;
  border-radius:12px;
  object-fit:cover;
}

.host-info{
  text-align:left;
}

.host-label{
  font-size:0.7em;
  font-weight:700;
  color:#999;
  letter-spacing:1px;
}

.host-name{
  font-weight:700;
  font-size:1.1em;
}

.host-link{
  display:inline-block;
  margin-top:5px;
  font-size:0.9em;
  color:var(--ocean);
  text-decoration:none;
  font-weight:600;
}

/* MAP */

.map-container{
  margin-top:30px;
  aspect-ratio:4/3;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.map-container iframe{
  width:100%;
  height:100%;
  border:0;
}

/* BUTTON */

.action{
  text-align:center;
  margin-top:25px;
}

.button{
  display:inline-block;
  background:var(--ocean);
  color:white;
  padding:12px 22px;
  border-radius:14px;
  text-decoration:none;
  font-weight:600;
  transition:0.2s;
}

.button:hover{
  transform:translateY(-2px);
}

/* FOOTER */

footer{
  text-align:center;
  padding:40px;
  opacity:0.6;
  font-size:0.9em;
}
</style>
</head>

<body>

<nav>
  <div class="brand">
    🌊 <span class="lanka">LANKA</span><span class="swell">SWELL</span>
  </div>

  <a href="index.html" class="back">← Back</a>
</nav>

<div class="container">

  <div class="title">MIRISSA</div>

  <!-- VIDEO -->
  <div class="video-container">
    <iframe 
      src="https://player.twitch.tv/?channel=testament_zigos&parent=lankaswell.github.io&muted=true"
      allowfullscreen>
    </iframe>
  </div>

  <!-- RESTAURANT BRANDING -->
  <div class="host">
    <img src="pappagallo.jpg" class="host-img">

    <div class="host-info">
      <div class="host-label">VIEW FROM</div>
      <div class="host-name">PAPPAGALLO RESTAURANT</div>

      <a href="https://www.google.com/maps?q=Pappagallo+Mirissa" 
         target="_blank" class="host-link">
         Visit location
      </a>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <iframe 
      src="https://www.google.com/maps?q=5.9487,80.4592&output=embed">
    </iframe>
  </div>

  <!-- DIRECTIONS -->
  <div class="action">
    <a href="https://www.google.com/maps/dir/?api=1&destination=5.9487,80.4592" 
       target="_blank" class="button">
      Get Directions
    </a>
  </div>

</div>

<footer>© 2026 LANKASWELL</footer>

</body>
</html>
