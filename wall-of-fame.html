<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>LankaSwell Wall of Fame</title>

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f7f7f7;

header{
  background:white;
  padding:22px;
  text-align:center;
  font-weight:800;
  font-size:1.4rem;

.intro{

}

.list{
  background:white;
  border-radius:16px;
  padding:10px 0;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.item{
  padding:14px 18px;
  border-bottom:1px solid rgba(0,0,0,0.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.item:last-child{
  border-bottom:none;
}

.name{
  font-weight:600;
}

.note{
  font-size:0.85rem;
  opacity:0.6;
}

.amount{
  font-weight:700;
  color:#0aa3a3;
  font-size:0.9rem;
}

.back{
  display:block;
  text-align:center;
  margin-top:20px;
