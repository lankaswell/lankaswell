<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliable HLS Streaming</title>
    <!-- Include the HLS decoder engine for Android/Chrome -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <!-- Standard HTML video tag remains exactly how iOS likes it -->
    <video 
      id="my-stream"
      controls 
      preload="auto" 
      playsinline 
      webkit-playsinline
      style="width: 100%; max-width: 640px; background: #000;">
      
      <!-- iOS reads this source directly -->
      <source src="https://www.lankaswell.com/live/mirissapoint/index.m3u8" type="application/x-mpegURL">
    </video>

    <script>
      const video = document.getElementById('my-stream');
      const streamUrl = 'https://www.lankaswell.com/live/mirissapoint/index.m3u8'; // Paste your exact link here too

      // Check if the browser requires an external engine (Android Chrome, PC, etc.)
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
      } 
      // Fallback for native iOS (Safari)
      else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
      }
    </script>

</body>
</html>
